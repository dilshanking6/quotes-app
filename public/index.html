<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quotes App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="logo">Quotes App</div>
            <div class="header-icons">
                <i class="fas fa-bell" id="notif-btn"></i>
                <i class="fas fa-search" onclick="navigate('search')"></i>
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Dynamic content injected here -->
        </main>

        <!-- Bottom Navigation -->
        <nav id="bottom-nav">
            <div class="nav-item" onclick="navigate('home')">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" onclick="navigate('map')">
                <i class="fas fa-map-marker-alt"></i>
                <span>Map</span>
            </div>
            <div class="nav-item plus-btn" onclick="navigate('create')">
                <i class="fas fa-plus-circle"></i>
            </div>
            <div class="nav-item" onclick="navigate('chat')">
                <i class="fas fa-comment-dots"></i>
                <span>Chat</span>
            </div>
            <div class="nav-item" onclick="navigate('profile')">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="hidden"></div>

    <!-- Libraries -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
